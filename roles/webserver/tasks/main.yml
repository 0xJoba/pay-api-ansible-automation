---

- name: Install httpd on CentOS
  ansible.builtin.yum:
    name: httpd
    state: present
  when: ansible_os_family == "RedHat"

- name: Install apache2 on Ubuntu
  ansible.builtin.apt:
    name: apache2
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Start the web service on CentOS
  ansible.builtin.service:
    name: httpd
    state: started
    enabled: yes
  when: ansible_os_family == "RedHat"

- name: Start the web service on Ubuntu
  ansible.builtin.service:
    name: apache2
    state: started
    enabled: yes
  when: ansible_os_family == "Debian"

- name: Install standard tools
  
  ansible.builtin.package: 
    name: "{{ item }}"
    state: present
  loop:
    - git
    - wget
    - zip
    - unzip
    - htop

- name: Deploy custom welcome page
  ansible.builtin.template:
    src: index.html.j2  
    dest: /var/www/html/index.html
    owner: root
    group: root
    mode: '0644'
